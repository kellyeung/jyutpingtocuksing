<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粵拼速成查碼</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --red: #c0392b;
    --gold: #b8860b;
    --dim: #8a8070;
    --card: #fffdf7;
    --border: #d4c9b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, #d4c9b022 31px, #d4c9b022 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, #d4c9b011 31px, #d4c9b011 32px);
  }

  header {
    width: 100%;
    text-align: center;
    padding: 48px 24px 24px;
    border-bottom: 2px solid var(--ink);
    background: var(--card);
    box-shadow: 0 2px 0 var(--gold);
    position: relative;
  }

  header::before {
    content: '粵';
    position: absolute;
    left: 32px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 64px;
    font-weight: 900;
    color: var(--red);
    opacity: 0.12;
    line-height: 1;
  }
  header::after {
    content: '碼';
    position: absolute;
    right: 32px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 64px;
    font-weight: 900;
    color: var(--red);
    opacity: 0.12;
    line-height: 1;
  }

  h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--ink);
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--dim);
    letter-spacing: 0.2em;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .container {
    width: 100%;
    max-width: 760px;
    padding: 40px 24px 60px;
  }

  .input-section {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 2px;
    box-shadow: 4px 4px 0 var(--border);
    padding: 28px;
    margin-bottom: 32px;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  input[type="text"] {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--ink);
    padding: 8px 0;
    outline: none;
    caret-color: var(--red);
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
  }

  input[type="text"]::placeholder {
    color: var(--border);
    font-weight: 400;
  }

  input[type="text"]:focus {
    border-color: var(--red);
  }

  .hint {
    font-size: 0.68rem;
    color: var(--dim);
    font-family: 'Space Mono', monospace;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .char-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 2px;
    box-shadow: 3px 3px 0 var(--border);
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.25s ease;
    transition: box-shadow 0.15s, transform 0.15s;
    cursor: default;
  }

  .char-card:hover {
    box-shadow: 5px 5px 0 var(--gold);
    transform: translate(-1px, -1px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .char-display {
    font-size: 3.2rem;
    font-weight: 900;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .char-jyutping {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--red);
    letter-spacing: 0.08em;
    font-weight: 700;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  .quick-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }

  .quick-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .quick-keys {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    border-radius: 3px;
    box-shadow: 0 2px 0 #00000066;
    letter-spacing: 0;
    transition: background 0.15s;
  }

  .key.radical-key {
    background: var(--red);
  }

  .quick-code-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .no-result {
    text-align: center;
    padding: 60px 0;
    color: var(--dim);
    grid-column: 1 / -1;
  }

  .no-result .big {
    font-size: 3rem;
    opacity: 0.3;
    margin-bottom: 12px;
  }

  .no-result p {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  footer {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
    text-align: center;
    padding: 24px;
    letter-spacing: 0.1em;
    opacity: 0.6;
  }
</style>
</head>

<header>

// Quick = first + last char of cangjie code
function toQuick(cj) {
  if (!cj || cj.length === 0) return '';
  if (cj.length === 1) return cj[0].toUpperCase();
  return (cj[0] + cj[cj.length-1]).toUpperCase();
}

function getRadicalName(letter) {
  return RADICAL[letter.toLowerCase()] || letter.toUpperCase();
}

// Strip tone number
function stripTone(jp) {
  return jp.replace(/[1-6]$/, '').toLowerCase().trim();
}

function lookup(raw) {
  const jp = stripTone(raw);
  return DATA[jp] || null;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
const input = document.getElementById('jyutInput');
const resultsEl = document.getElementById('results');
const sectionTitleEl = document.getElementById('sectionTitle');

function buildCard(char, cj) {
  const quick = toQuick(cj);
  const card = document.createElement('div');
  card.className = 'char-card';

  // Character display
  const charEl = document.createElement('div');
  charEl.className = 'char-display';
  charEl.textContent = char;

  // Jyutping label
  const jpEl = document.createElement('div');
  jpEl.className = 'char-jyutping';
  jpEl.textContent = input.value.trim() || '';

  // Divider
  const div = document.createElement('div');
  div.className = 'divider';

  // Quick section
  const qs = document.createElement('div');
  qs.className = 'quick-section';

  const qlabel = document.createElement('div');
  qlabel.className = 'quick-label';
  qlabel.textContent = '速成碼';

  const qkeys = document.createElement('div');
  qkeys.className = 'quick-keys';

  for (const letter of quick) {
    const k = document.createElement('div');
    k.className = 'key radical-key';
    k.textContent = letter;
    k.title = getRadicalName(letter);
    qkeys.appendChild(k);
  }

  const radNames = [...quick].map(l => getRadicalName(l)).join('＋');
  const qtxt = document.createElement('div');
  qtxt.className = 'quick-code-text';
  qtxt.textContent = radNames;

  // Full cangjie
  const cjlabel = document.createElement('div');
  cjlabel.className = 'quick-label';
  cjlabel.style.marginTop = '8px';
  cjlabel.textContent = '倉頡全碼';

  const cjkeys = document.createElement('div');
  cjkeys.className = 'quick-keys';
  for (const letter of cj.toUpperCase()) {
    const k = document.createElement('div');
    k.className = 'key';
    k.textContent = letter;
    k.title = getRadicalName(letter);
    cjkeys.appendChild(k);
  }

  qs.appendChild(qlabel);
  qs.appendChild(qkeys);
  qs.appendChild(qtxt);
  qs.appendChild(cjlabel);
  qs.appendChild(cjkeys);

  card.appendChild(charEl);
  card.appendChild(jpEl);
  card.appendChild(div);
  card.appendChild(qs);

  return card;
}

function render(val) {
  resultsEl.innerHTML = '';
  if (!val.trim()) {
    sectionTitleEl.style.display = 'none';
    return;
  }
  const matches = lookup(val);
  if (!matches) {
    sectionTitleEl.style.display = 'block';
    sectionTitleEl.textContent = `"${val.trim()}" — 未找到對應字`;
    const msg = document.createElement('div');
    msg.className = 'no-result';
    msg.innerHTML = `<div class="big">🈚</div><p>請確認粵拼拼寫是否正確</p>`;
    resultsEl.appendChild(msg);
    return;
  }
  sectionTitleEl.style.display = 'block';
  sectionTitleEl.textContent = `"${stripTone(val)}" — ${matches.length} 個結果`;
  matches.forEach(([char, cj]) => {
    resultsEl.appendChild(buildCard(char, cj));
  });
}

input.addEventListener('input', () => render(input.value));
