<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粵拼速成查碼</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --red: #c0392b;
    --gold: #b8860b;
    --dim: #8a8070;
    --card: #fffdf7;
    --border: #d4c9b0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--paper); color:var(--ink);
    font-family:'Noto Serif TC',serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 31px,#d4c9b022 31px,#d4c9b022 32px),
      repeating-linear-gradient(90deg,transparent,transparent 31px,#d4c9b011 31px,#d4c9b011 32px);
  }
  header {
    width:100%; text-align:center; padding:40px 24px 20px;
    border-bottom:2px solid var(--ink); background:var(--card);
    box-shadow:0 2px 0 var(--gold); position:relative;
  }
  header::before{content:'粵';position:absolute;left:32px;top:50%;transform:translateY(-50%);font-size:64px;font-weight:900;color:var(--red);opacity:.1;}
  header::after {content:'碼';position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:64px;font-weight:900;color:var(--red);opacity:.1;}
  h1{font-size:2rem;font-weight:900;letter-spacing:.15em;}
  .subtitle{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--dim);letter-spacing:.2em;margin-top:5px;text-transform:uppercase;}
  .container{width:100%;max-width:860px;padding:36px 24px 60px;}
  .input-section{background:var(--card);border:1.5px solid var(--border);border-radius:2px;box-shadow:4px 4px 0 var(--border);padding:26px 28px 20px;margin-bottom:28px;}
  .input-row{display:flex;gap:10px;align-items:flex-end;}
  .input-group{flex:1;}
  label.field-label{display:block;font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
  input#jyutInput{
    width:100%;font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;
    color:var(--ink);background:transparent;border:none;border-bottom:2px solid var(--ink);
    padding:6px 0;outline:none;caret-color:var(--red);letter-spacing:.1em;transition:border-color .2s;
  }
  input#jyutInput::placeholder{color:var(--border);font-weight:400;}
  input#jyutInput:focus{border-color:var(--red);}
  .hint{font-size:.65rem;color:var(--dim);font-family:'Space Mono',monospace;margin-top:7px;letter-spacing:.04em;}
  .search-btn{
    font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;
    letter-spacing:.1em;background:var(--ink);color:var(--paper);border:none;
    padding:10px 22px;cursor:pointer;box-shadow:3px 3px 0 var(--gold);
    transition:all .15s;white-space:nowrap;text-transform:uppercase;
  }
  .search-btn:hover{background:var(--red);box-shadow:3px 3px 0 #8b1a1a;}
  .section-title{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--dim);letter-spacing:.25em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;}
  .char-card{
    background:var(--card);border:1.5px solid var(--border);border-radius:2px;
    box-shadow:3px 3px 0 var(--border);padding:18px 16px 14px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    animation:fadeIn .25s ease both;transition:box-shadow .15s,transform .15s;
  }
  .char-card:hover{box-shadow:5px 5px 0 var(--gold);transform:translate(-1px,-1px);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .char-display{font-size:2.8rem;font-weight:900;line-height:1;}
  .char-jyutping{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--red);font-weight:700;letter-spacing:.08em;}
  .divider{width:100%;height:1px;background:var(--border);}
  .quick-section{width:100%;display:flex;flex-direction:column;gap:5px;align-items:center;}
  .qlabel{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;}
  .quick-keys{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
  .key{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--ink);color:var(--paper);font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;border-radius:3px;box-shadow:0 2px 0 #00000066;}
  .key.qk{background:var(--red);}
  .rname{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--dim);letter-spacing:.06em;}
  /* multi-result tabs */
  .multi-wrap{width:100%;}
  .multi-tabs{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:6px;}
  .tab-btn{font-size:1.1rem;background:var(--paper);border:1px solid var(--border);border-radius:2px;padding:2px 8px;cursor:pointer;transition:background .12s;font-family:'Noto Serif TC',serif;}
  .tab-btn:hover,.tab-btn.active{background:var(--ink);color:var(--paper);}
  .no-result{text-align:center;padding:48px 0;color:var(--dim);grid-column:1/-1;}
  .no-result .big{font-size:2.5rem;opacity:.3;margin-bottom:10px;}
  .no-result p{font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.08em;}
  footer{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--dim);text-align:center;padding:20px;letter-spacing:.08em;opacity:.5;}
</style>
</head>

// ── helpers ────────────────────────────────────────────────────────────────
function stripTone(s){ return s.replace(/[1-6]$/,'').toLowerCase().trim(); }
function toQuick(cj){
  if(!cj||!cj.length) return '';
  if(cj.length===1) return cj[0].toUpperCase()+cj[0].toUpperCase();
  return (cj[0]+cj[cj.length-1]).toUpperCase();
}
function rname(l){ return R[l.toLowerCase()]||l.toUpperCase(); }

// ── DOM ────────────────────────────────────────────────────────────────────
const inp = document.getElementById('jyutInput');
const resultsEl = document.getElementById('results');
const titleEl   = document.getElementById('sectionTitle');
const btn       = document.getElementById('searchBtn');

inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });

function doSearch(){
  const raw = inp.value.trim();
  if(!raw){ clear(); return; }

  // Split by spaces → multiple syllables
  const syllables = raw.split(/\s+/).map(stripTone).filter(Boolean);

  // Collect results per syllable
  const groups = syllables.map(syl => ({ syl, matches: D[syl]||[] }));

  const total = groups.reduce((s,g)=>s+g.matches.length,0);

  resultsEl.innerHTML='';
  if(total===0){
    titleEl.style.display='block';
    titleEl.textContent=`"${raw}" — 未找到對應字`;
    resultsEl.innerHTML='<div class="no-result"><div class="big">🈚</div><p>請確認粵拼拼寫是否正確</p></div>';
    return;
  }

  titleEl.style.display='block';
  if(syllables.length===1){
    titleEl.textContent=`"${syllables[0]}" — ${total} 個結果`;
  } else {
    titleEl.textContent=`${syllables.join(' ')} — ${syllables.length} 個音節`;
  }

  let cardIndex=0;
  groups.forEach(g=>{
    if(g.matches.length===0){
      // show a "not found" placeholder
      const card=document.createElement('div');
      card.className='char-card';
      card.style.animationDelay=(cardIndex*0.04)+'s';
      card.innerHTML=`
        <div class="char-display" style="opacity:.3">?</div>
        <div class="char-jyutping">${g.syl}</div>
        <div class="divider"></div>
        <div class="quick-section"><div class="qlabel">冇呢個音節</div></div>`;
      resultsEl.appendChild(card);
      cardIndex++;
      return;
    }

    if(g.matches.length===1){
      // single result → plain card
      resultsEl.appendChild(makeCard(g.matches[0][0], g.matches[0][1], g.syl, cardIndex));
      cardIndex++;
    } else {
      // multiple results → card with tabs
      const card=document.createElement('div');
      card.className='char-card';
      card.style.animationDelay=(cardIndex*0.04)+'s';

      const tabsHtml=g.matches.map((m,i)=>
        `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(this,'${g.syl}',${i})">${m[0]}</button>`
      ).join('');

      const first=g.matches[0];
      const cj=first[1];
      const qk=toQuick(cj);

      card.innerHTML=`
        <div class="multi-wrap">
          <div class="multi-tabs">${tabsHtml}</div>
        </div>
        <div class="char-jyutping">${g.syl}</div>
        <div class="divider"></div>
        ${quickSection(cj, qk)}`;

      // store data
      card.dataset.syl=g.syl;
      card.dataset.matches=JSON.stringify(g.matches);
      resultsEl.appendChild(card);
      cardIndex++;
    }
  });
}

function makeCard(char, cj, syl, idx){
  const qk=toQuick(cj);
  const card=document.createElement('div');
  card.className='char-card';
  card.style.animationDelay=(idx*0.04)+'s';
  card.innerHTML=`
    <div class="char-display">${char}</div>
    <div class="char-jyutping">${syl}</div>
    <div class="divider"></div>
    ${quickSection(cj, qk)}`;
  return card;
}

function quickSection(cj, qk){
  const qkKeys=[...qk].map(l=>`<div class="key qk" title="${rname(l)}">${l}</div>`).join('');
  const cjKeys=[...cj.toUpperCase()].map(l=>`<div class="key" title="${rname(l)}">${l}</div>`).join('');
  const qkNames=[...qk.toLowerCase()].map(rname).join('＋');
  return `
    <div class="quick-section">
      <div class="qlabel">速成碼</div>
      <div class="quick-keys">${qkKeys}</div>
      <div class="rname">${qkNames}</div>
      <div class="qlabel" style="margin-top:6px">倉頡全碼</div>
      <div class="quick-keys">${cjKeys}</div>
    </div>`;
}

function switchTab(btn, syl, idx){
  const card=btn.closest('.char-card');
  const matches=JSON.parse(card.dataset.matches);
  const [char,cj]=matches[idx];
  const qk=toQuick(cj);

  // update active tab
  card.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));

  // update quick section (replace everything after jyutping)
  const divider=card.querySelector('.divider');
  const qs=card.querySelector('.quick-section');
  divider.nextElementSibling && qs && qs.remove();
  divider.insertAdjacentHTML('afterend', quickSection(cj, qk));
}

function clear(){
  resultsEl.innerHTML='';
  titleEl.style.display='none';
}
